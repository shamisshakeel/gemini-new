<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Hanif Rajput Pakwan - Premium POS & Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="print-area"></div>

<div class="modal-overlay" id="secure-pin-modal">
    <div class="modal-box">
        <div id=\"modal-title-text\" class="modal-title">Security Key Required</div>
        <input type="password" id="modal-pin-input" class="input-field pin-input" placeholder="••••">
        <div class="modal-btn-group">
            <button class="btn btn-danger btn-half" onclick="closePinModal()">Cancel</button>
            <button class="btn btn-primary btn-half btn-accent-bg" onclick="submitPinModal()">Verify</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="customer-name-modal">
    <div class="modal-box modal-wide">
        <div class="modal-title">Select Profile Context Mapping</div>
        </div>
</div>

<div class="app-container">
    <div class="main-workspace">
        <div class="audit-log-panel-wrapper">
            
            <div class="filter-panel" style="margin-bottom: 12px;">
                <div class="filter-group">
                    <label>Filter Event Type</label>
                    <select id="audit-filter-type" class="select-field" onchange="renderAuditLog()">
                        <option value="ALL">-- All Event Types --</option>
                        <option value="SHIFT_CONTROL">Shift Control Actions</option>
                        <option value="PASSWORD_ATTEMPT">Password Attempts</option>
                        <option value="SETTINGS_CHANGED">Settings & Data Changes</option>
                        <option value="CUSTOMER_MODIFIED">Worker Profile Changes</option>
                        <option value="DATA_RESTORED">Data Restoration Events</option>
                        <option value="HISTORY_CLEARED">History Clear Events</option>
                    </select>
                </div>
            </div>
            
            <div class="excel-table-container">
                <table class="excel-table">
                    <thead>
                        <tr>
                            <th class="w-200">Timestamp Node</th>
                            <th class="w-150">Event Category Type</th>
                            <th>Event Description Details</th>
                            <th class="w-100">Execution Status</th>
                        </tr>
                    </thead>
                    <tbody id="audit-log-tbody"></tbody>
                </table>
            </div>

        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
